name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before opening this request:**
        - Check the README — your idea may already be planned.
        - Check open issues to avoid duplicates.
        - Keep requests scoped and specific. Vague requests will be closed.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or frustration this would address. Focus on the problem, not the solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
      description: Describe what you want to happen. Be specific about the behavior, not just the concept.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you thought of other ways to solve this?
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Anything Else?
      description: Screenshots, references, or any extra context.
    validations:
      required: false
